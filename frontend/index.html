<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- gsc-verification -->
    <!-- custom-head-tags -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬇️</text></svg>" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("dhp_theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <title>TinyDown — Download Video, Image & Audio from Any Platform</title>
    <meta
      name="description"
      content="Download videos, reels, shorts, stories, images and audio from YouTube, TikTok, Instagram, Facebook and 1000+ sites. Fast, free and watermark-free."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tinydown.com/" />
    <meta name="author" content="TinyDown" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TinyDown" />
    <meta property="og:title" content="TinyDown — Download Video, Image & Audio" />
    <meta
      property="og:description"
      content="Download from YouTube, TikTok, Instagram, Facebook and 1000+ sites. Fast, free and watermark-free."
    />
    <meta property="og:url" content="https://tinydown.com/" />
    <meta property="og:image" content="https://tinydown.com/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TinyDown — Download Video, Image & Audio" />
    <meta
      name="twitter:description"
      content="Download from YouTube, TikTok, Instagram, Facebook and 1000+ sites. Fast, free and watermark-free."
    />
    <meta name="twitter:image" content="https://tinydown.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
