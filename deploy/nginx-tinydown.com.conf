server {
    server_name tinydown.com www.tinydown.com;

    # SPA served by the "web" container (built React app)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tinydown.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tinydown.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.tinydown.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = tinydown.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name tinydown.com www.tinydown.com;
    return 404;
}
